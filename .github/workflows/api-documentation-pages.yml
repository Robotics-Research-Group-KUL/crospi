name: Generate Documentation

on:
  push:
    branches: [main]
    paths:
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.cpp'
      - '**/*.c'
      - '**/*.py'
      - '**/*.lua'
      - 'DoxyfileCppPartial'
      - 'DoxyfileCppFull'
      - 'DoxyfilePy'
      - '.github/workflows/api-documentation-pages.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Install LDoc
        run: |
          sudo apt-get install -y lua5.2 liblua5.2-dev luarocks
          sudo luarocks install ldoc

      - name: Generate C++ documentation (partial)
        run: doxygen DoxyfileCppPartial

      - name: Save partial C++ docs
        run: mv cppdocs/html cppdocs/html-partial

      - name: Generate C++ documentation (full)
        run: doxygen DoxyfileCppFull

      - name: Generate Python documentation
        run: doxygen DoxyfilePy

      - name: Generate Lua documentation
        run: ldoc -a -d luadocs crospi_core/scripts/lib/task_requirements.lua

      - name: Prepare GitHub Pages artifact
        run: |
          mkdir -p _site/cpp _site/cpp-full _site/py _site/lua

          # Copy C++ partial docs
          if [ -d cppdocs/html-partial ]; then
            cp -r cppdocs/html-partial/* _site/cpp/
          fi

          # Copy C++ full docs
          if [ -d cppdocs/html ]; then
            cp -r cppdocs/html/* _site/cpp-full/
          fi

          # Copy Python docs
          if [ -d pydocs/html ]; then
            cp -r pydocs/html/* _site/py/
          fi

          # Copy Lua docs
          if [ -d luadocs ]; then
            cp -r luadocs/* _site/lua/
          fi

          # Create landing page
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Crospi Documentation</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
              .container { text-align: center; padding: 2rem; }
              h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #ffffff; }
              p { color: #a0a0b0; margin-bottom: 2rem; }
              .cards { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
              .card { background: #16213e; border: 1px solid #0f3460; border-radius: 12px; padding: 2rem; width: 260px; text-decoration: none; color: inherit; transition: transform 0.2s, box-shadow 0.2s; }
              .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
              .card h2 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #e94560; }
              .card p { font-size: 0.9rem; margin: 0; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Crospi Documentation</h1>
              <p>Auto-generated API documentation from source code</p>
              <p>Only code that users of Crospi could interact with is documented here. Internal Crospi code is excluded.</p>
              <div class="cards">
                <a class="card" href="cpp/index.html">
                  <h2>Plugins C++ API</h2>
                  <p>Doxygen-generated C++ documentation</p>
                  <p>For Crospi plugin developers</p>
                </a>
                <a class="card" href="py/index.html">
                  <h2>Orchestration Python API</h2>
                  <p>Doxygen-generated Python documentation</p>
                  <p>For application or skill developers (orchestration)</p>
                </a>
                <a class="card" href="lua/index.html">
                  <h2>Lua API</h2>
                  <p>LDoc-generated Lua documentation</p>
                  <p>For eTaSL task specification developers</p>
                </a>
                <a class="card" href="cpp-full/index.html">
                  <h2>Full C++ API</h2>
                  <p>Complete Doxygen-generated C++ documentation</p>
                  <p>For Crospi source code contributors</p>
                </a>
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
